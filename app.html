<!doctype html>
<html>
  <head>
    <title>AI Interview Assistant</title>
  </head>
  <body>
    <h1>AI Interview Assistant</h1>

    <h3>Registration</h3>

    <input type="text" id="name" placeholder="Name" /><br /><br />

    <input type="email" id="email" placeholder="Email" /><br /><br />

    <input type="text" id="role" placeholder="Role" /><br /><br />

    <button onclick="register()">Register</button>

    <hr />

    <button onclick="getQuestion()">Generate Question</button>

    <h3 id="question"></h3>

    <textarea
      id="answer"
      rows="6"
      cols="60"
      placeholder="Type Answer Here"
    ></textarea>

    <br /><br />

    <button onclick="evaluateAnswer()">Submit Answer</button>

    <pre id="result"></pre>

    <script>
      async function register() {
        await fetch("http://127.0.0.1:5000/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            role: document.getElementById("role").value,
          }),
        });

        alert("Registered Successfully");
      }

      async function getQuestion() {
        const role = document.getElementById("role").value;

        const response = await fetch(
          `http://127.0.0.1:5000/questions?role=${role}`,
        );

        const data = await response.json();

        document.getElementById("question").innerText = data.question;
      }

      async function evaluateAnswer() {
        const response = await fetch("http://127.0.0.1:5000/evaluation", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            question: document.getElementById("question").innerText,

            answer: document.getElementById("answer").value,
          }),
        });

        const data = await response.json();

        document.getElementById("result").innerText = data.evaluation;
      }
    </script>
  </body>
</html>
